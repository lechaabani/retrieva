<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retrieva Search</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header-inner">
                <a href="#" class="logo">
                    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                        <rect width="28" height="28" rx="6" fill="var(--primary)"/>
                        <circle cx="13" cy="13" r="5" stroke="#fff" stroke-width="2" fill="none"/>
                        <path d="M17 17l3.5 3.5" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <span>Retrieva Search</span>
                </a>
                <div class="header-actions">
                    <kbd class="shortcut-hint"><span>&#8984;</span>K</kbd>
                </div>
            </div>
        </header>

        <main class="main">
            <section class="search-hero" id="searchHero">
                <h1 class="hero-title">Search the Knowledge Base</h1>
                <p class="hero-subtitle">Find answers instantly across all documents, articles, and resources.</p>
                <div class="search-bar-wrapper">
                    <div class="search-bar" id="searchBar">
                        <svg class="search-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <circle cx="9" cy="9" r="5.5" stroke="currentColor" stroke-width="1.5" fill="none"/>
                            <path d="M13.5 13.5L17 17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                        <input
                            type="text"
                            id="searchInput"
                            placeholder="Type your search query..."
                            autocomplete="off"
                            autofocus
                        >
                        <div class="search-clear" id="searchClear" style="display:none">
                            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                        </div>
                    </div>
                </div>
            </section>

            <section class="results-area" id="resultsArea">
                <div class="results-layout">
                    <aside class="filters-sidebar" id="filtersSidebar">
                        <h3 class="filters-title">Filters</h3>
                        <div class="filter-group">
                            <label class="filter-label">Document Type</label>
                            <div class="filter-options">
                                <label class="filter-option">
                                    <input type="checkbox" checked> All
                                </label>
                                <label class="filter-option">
                                    <input type="checkbox"> PDF
                                </label>
                                <label class="filter-option">
                                    <input type="checkbox"> Web Page
                                </label>
                                <label class="filter-option">
                                    <input type="checkbox"> Document
                                </label>
                            </div>
                        </div>
                        <div class="filter-group">
                            <label class="filter-label">Relevance</label>
                            <div class="filter-options">
                                <label class="filter-option">
                                    <input type="checkbox" checked> Any score
                                </label>
                                <label class="filter-option">
                                    <input type="checkbox"> High (&gt;0.8)
                                </label>
                            </div>
                        </div>
                    </aside>

                    <div class="results-main">
                        <div class="results-header" id="resultsHeader" style="display:none">
                            <span class="results-count" id="resultsCount"></span>
                            <span class="results-time" id="resultsTime"></span>
                        </div>

                        <div class="results-list" id="resultsList">
                            <!-- Results rendered here -->
                        </div>

                        <!-- States -->
                        <div class="state-empty" id="stateEmpty">
                            <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                                <circle cx="22" cy="22" r="12" stroke="var(--text-muted)" stroke-width="2" fill="none"/>
                                <path d="M31 31l8 8" stroke="var(--text-muted)" stroke-width="2" stroke-linecap="round"/>
                            </svg>
                            <p>Start typing to search across your knowledge base</p>
                        </div>

                        <div class="state-loading" id="stateLoading" style="display:none">
                            <div class="loading-spinner"></div>
                            <p>Searching...</p>
                        </div>

                        <div class="state-no-results" id="stateNoResults" style="display:none">
                            <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                                <circle cx="24" cy="24" r="18" stroke="var(--text-muted)" stroke-width="2" fill="none"/>
                                <path d="M18 18l12 12M30 18L18 30" stroke="var(--text-muted)" stroke-width="2" stroke-linecap="round"/>
                            </svg>
                            <p>No results found. Try a different query.</p>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
