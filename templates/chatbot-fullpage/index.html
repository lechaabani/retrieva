<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retrieva Chat</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                        <rect width="28" height="28" rx="6" fill="var(--primary)"/>
                        <path d="M8 10h12M8 14h8M8 18h10" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <span class="logo-text">Retrieva</span>
                </div>
                <button class="btn-icon sidebar-close" id="sidebarClose" aria-label="Close sidebar">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M6 6l8 8M14 6l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                </button>
            </div>
            <button class="new-chat-btn" id="newChatBtn">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 3v12M3 9h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                New Chat
            </button>
            <nav class="chat-history" id="chatHistory">
                <p class="history-empty">No previous conversations</p>
            </nav>
            <div class="sidebar-footer">
                <span class="powered-by">Powered by Retrieva RAG</span>
            </div>
        </aside>

        <main class="chat-area">
            <header class="chat-header">
                <button class="btn-icon sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                </button>
                <div class="header-info">
                    <h1 class="collection-name" id="collectionName">Knowledge Base Assistant</h1>
                    <span class="status-badge">Online</span>
                </div>
            </header>

            <div class="messages" id="messages">
                <!-- Messages rendered here -->
            </div>

            <div class="input-area">
                <form class="input-form" id="inputForm">
                    <div class="input-wrapper">
                        <textarea
                            id="userInput"
                            placeholder="Ask a question..."
                            rows="1"
                            autofocus
                        ></textarea>
                        <button type="submit" class="send-btn" id="sendBtn" aria-label="Send message">
                            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                                <path d="M3 10l14-7-4 14-3-5.5L3 10z" fill="currentColor"/>
                            </svg>
                        </button>
                    </div>
                    <p class="input-hint">Press Enter to send, Shift+Enter for new line</p>
                </form>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
