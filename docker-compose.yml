services:
  # ---------------------------------------------------------------------------
  # API - FastAPI application server
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: retrieva-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://retrieva:retrieva@postgres:5432/retrieva
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - upload_data:/data/documents
      - ./config.yaml:/app/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - retrieva-net

  # ---------------------------------------------------------------------------
  # Worker - Celery task worker
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: retrieva-worker
    restart: unless-stopped
    command: >
      celery -A workers.celery_app worker
      --loglevel=info
      --concurrency=2
      --max-tasks-per-child=100
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://retrieva:retrieva@postgres:5432/retrieva
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - upload_data:/data/documents
      - ./config.yaml:/app/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - retrieva-net

  # ---------------------------------------------------------------------------
  # Beat - Celery periodic task scheduler
  # ---------------------------------------------------------------------------
  beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: retrieva-beat
    restart: unless-stopped
    command: >
      celery -A workers.celery_app beat
      --loglevel=info
      --schedule=/tmp/celerybeat-schedule
    env_file: .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - retrieva-net

  # ---------------------------------------------------------------------------
  # PostgreSQL - Relational database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: retrieva-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-retrieva}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-retrieva}
      POSTGRES_DB: ${POSTGRES_DB:-retrieva}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-retrieva} -d ${POSTGRES_DB:-retrieva}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - retrieva-net

  # ---------------------------------------------------------------------------
  # Qdrant - Vector database
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: retrieva-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c 'echo > /dev/tcp/localhost/6333' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - retrieva-net

  # ---------------------------------------------------------------------------
  # Redis - Cache & message broker
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: retrieva-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - retrieva-net

  # ---------------------------------------------------------------------------
  # Dashboard - Next.js frontend
  # ---------------------------------------------------------------------------
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: retrieva-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      INTERNAL_API_URL: http://api:8000
      NEXT_PUBLIC_API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    networks:
      - retrieva-net

volumes:
  postgres_data:
    driver: local
  qdrant_data:
    driver: local
  redis_data:
    driver: local
  upload_data:
    driver: local

networks:
  retrieva-net:
    driver: bridge
