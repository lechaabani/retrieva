name: notion
type: connector
version: "1.0.0"
description: "Notion connector for ingesting pages and database entries via the Notion API"
author: "Retrieva Team"
license: "MIT"
entry_point: "plugin:NotionConnectorPlugin"
config_schema:
  api_key:
    type: string
    description: "Notion internal integration token (secret_xxx)"
  database_ids:
    type: array
    description: "Specific Notion database IDs to query pages from"
  page_ids:
    type: array
    description: "Specific Notion page IDs to fetch directly"
  max_pages:
    type: integer
    default: 200
    description: "Maximum number of pages to retrieve"
dependencies: []
tags:
  - connector
  - notion
  - wiki
  - knowledge-base
bundled: true
